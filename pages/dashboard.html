<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <button id="btn-logout" class="btn btn-logout" onclick="logout()">Logout</button>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="main-container">
        <div class="left-panel">
            <img src="/Assests/Group 2 anyi[1].png" alt="Logo" class="img-fluid" style="width: 100px;">
            <h1 class="fw-bold">Welcome IQ Buddy!</h1>
            <p class="text-center mt-3">Here at the IQ community, we help you challenge and prove your mind's prowess.
            </p>
        </div>

        <div class="right-panel">
            <div class="dashboard-container">
                <h2 class="fw-bold">Available Quizzes</h2>
                <div id="quiz-list">
                    <!-- Quizzes will be dynamically inserted here -->
                    <p id="no-quizzes" class="text-muted">Loading quizzes...</p>
                </div>

                <button id="create-quiz-btn" class="btn btn-primary mt-3" style="display: none;"
                    onclick="goToCreateQuiz()">Create Your Own Quiz</button>
            </div>
        </div>
    </div>

    <script src="/js/dashboard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
