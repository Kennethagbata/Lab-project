<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/reset.css">
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <button class="btn btn-signup" style="height: 32px; font-size: small; border-radius: 3px;"><a href="./signin.html" style="color: white; text-decoration: none;">Sign in</a></button>
    </div>
    
    <!-- LOGO -->
    <div class="main-container m-0 p-0">

            <div class="col-md-6 left-panel">
                <img src="/Assests/Group 2 anyi[1].png" alt="Logo" class="img-fluid" style="width: 100px;">
                <h1 class="fw-bold">Welcome IQ Buddy!</h1>
                <p class="text-center mt-3">Here at the IQ community, we help <br> you challenge and prove your mind's prowess <br> by unlocking achievements and climbing the IQers' <br> leaderboard with each question conquered. Have fun!</p>
            </div>

            <!-- RESET PASSWORD -->
            <div><img class="img1" src="/Assests/icomoon-free_book.png" alt="Book Icon" style="width: 80px; height: 80px; position: absolute; top: 70px; right: 10px;"></div>
            <div class="col-md-6 right-panel position-relative">
                <div class="form-container" id="Reset">
                   
                    <div class="form-header">
                        <h2 class="fw-bold" style="font-size: large;">Reset Password</h2>
                    </div>
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person" viewBox="0 0 16 16">
                                <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10s-3.516.68-4.168 1.332c-.678.678-.83 1.418-.832 1.664z"/>
                              </svg> Email Address</label>
                            <input type="email" class="form-control" style="width: 400px; height: 20px; font-size: small; border-radius: 0.5px;" id="email" placeholder="Enter text here...">
                        </div>
                        <button type="button" class="btn btn-primary" style="height: 32px; font-size: small; border-radius: 0.5px;">Reset Password</button>
                    </form>
                    <img class="img3" src="/Assests/icomoon-free_book.png" alt="Book Icon" style="width: 80px; height: 80px; position: absolute; bottom: 10px; left: 10px;">
                </div>
            </div>
    </div>
    <script src="/js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
