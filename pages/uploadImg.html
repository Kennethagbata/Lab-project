<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Options</title>
    <link rel="stylesheet" href="/css/uploadImg.css">
</head>
<body>
    <div class="image-options-container">
        <!-- Options at the Top -->
         <h1 style="font-size: medium; left: 22px; position: absolute; margin-top: 30px; font-weight: lighter;">Insert image</h1>
        <div class="options">
            <div class="option" id="upload-option" onclick="setActiveOption('upload')">
                <label>Upload from Gallery</label>
            </div>
            <div class="option" id="camera-option" onclick="setActiveOption('camera')">
                <label>Access Camera</label>
            </div>
            <div class="option" id="use-photo-option" onclick="setActiveOption('use-photo')">
                <label>Use a Photo</label>
            </div>
            <div class="option" id="google-search-option" onclick="setActiveOption('google-search')">
                <label>Google Image Search</label>
            </div>
        </div>

        <!-- Button in the Middle -->
        <div class="button-container" id="button-container">
            <img src="/Assests/lets-icons_cloud.png" alt="Cloud Logo" class="cloud-logo">
            <button id="action-button"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="9" fill="currentColor" class="bi bi-upload" viewBox="0 0 16 16">
                <path d="M.5 9.9a.5.5 0 0 1 .5.5v2.5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-2.5a.5.5 0 0 1 1 0v2.5a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2v-2.5a.5.5 0 0 1 .5-.5"/>
                <path d="M7.646 1.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1-.708.708L8.5 2.707V11.5a.5.5 0 0 1-1 0V2.707L5.354 4.854a.5.5 0 1 1-.708-.708z"/>
              </svg> Upload media</button>
        </div>
    </div>

    <!-- Hidden File Input for Upload -->
    <input type="file" id="upload-input" accept="image/*" style="display: none;">

    <script src="/js/uploadImg.js"></script>
</body>
</html>
