<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQ Buddy</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="container-fluid vh-100 d-flex align-items-stretch justify-content-stretch">
        <div class="row w-100">

            <!-- LEFT SIDE -->
        <div class="col-md-6 bg-primary text-white d-flex flex-column justify-content-center align-items-center text-center p-5">
        <img src="path-to-logo.png" alt="IQ Logo" class="mb-4" style="width: 120px;">
        <h1 class="mb-3">Welcome IQ Buddy!</h1>
        <p class="text-center">
         At the IQ community, we help you challenge and prove your mind's prowess by unlocking achievements and climbing the IQers' leaderboard with each question conquered. Have fun!
        </p>
        </div>

            <!-- RIGHT SIDE -->
        <div class="col-md-6 d-flex justify-content-center align-items-center">
        <div class="card p-4 shadow" style="width: 100%; max-width: 400px;">
        
        <h2 class="text-center mb-3">Sign In</h2>
        <p class="text-center mb-4">Sign in to your IQ account</p>

            <!-- FORM -->
        <form>
            <!-- EMAIL -->
        <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="Enter email">
        </div>

            <!-- PASSWORD -->
        <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>

            <!-- FORGOT PASSWORD LINK -->
        <div class="d-flex justify-content-between">
        <a href="#" class="text-decoration-none">Forgot Password?</a>
        </div>

              <!-- SIGN IN BUTTON -->
        <button type="submit" class="btn btn-primary w-100 mt-3">Sign In</button>

              <!-- SIGN UP LINK -->
        <p class="text-center mt-3">
            Don't have an account? <a href="#" class="text-decoration-none">Sign Up</a>
        </p>
        </form>


        </div>
        </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js" integrity="sha384-IQsoLXl5PILFhosVNubq5LC7Qb9DXgDA9i+tQ8Zj3iwWAwPtgFTxbJ8NT4GN1R8p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js" integrity="sha384-cVKIPhGWiC2Al4u+LWgxfKTRIcfu0JTxR+EQDz/bgldoEyl4H0zUF0QKbrJ0EcQF" crossorigin="anonymous"></script>
    <script src="login.js"></script>
</body>
</html>
